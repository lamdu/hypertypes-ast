name: hypertypes-ast
version: 0.3.0
github: "lamdu/hypertypes-ast"
license: BSD3
author: "Yair Chuchem"
maintainer: "yairchu@gmail.com"
copyright: 2018 Yair Chuchem

extra-source-files:
- README.md
- ChangeLog.md

synopsis: AST, unification, and type inference utilities for hypertypes
category: Algorithms, Compilers/Interpreters, Language, Logic, Unification

description: Please see the README on GitHub at <https://github.com/lamdu/hypertypes-ast#readme>

dependencies:
- base >= 4.9 && <5
- constraints
- containers
- generic-constraints
- lattices
- lens
- monad-st
- mtl
- pretty
- hypertypes

default-extensions:
- ConstraintKinds
- DataKinds
- DefaultSignatures
- DeriveGeneric
- DerivingStrategies
- GADTs
- GeneralizedNewtypeDeriving
- LambdaCase
- MultiParamTypeClasses
- RankNTypes
- ScopedTypeVariables
- StandaloneDeriving
- TupleSections
- TypeApplications
- TypeOperators
- TypeFamilies
- NoImplicitPrelude

ghc-options:
- -fexpose-all-unfoldings
- -Wall
- -Wcompat
- -Wredundant-constraints
- -Wunused-packages
ghc-prof-options:
- -fexpose-all-unfoldings

library:
  source-dirs: src
  other-modules:
  - Hyper.Internal.Prelude
  dependencies:
  - array
  - base-compat
  - binary
  - deepseq
  - pretty
  - show-combinators
  - template-haskell
  - transformers
  ghc-options:
  - -Wnoncanonical-monad-instances
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns

tests:
  hypertypes-ast-test:
    main: Spec.hs
    source-dirs: test
    when:
    - condition: false
      other-modules:
      - Benchmark
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - generic-data
    - hypertypes
    - hypertypes-ast
    - tasty
    - tasty-hunit
    - text

benchmarks:
  hypertypes-ast-bench:
    main: Benchmark.hs
    source-dirs: test
    other-modules:
    - Hyper.Infer.Infer1
    - Hyper.Syntax.NamelessScope
    - LangB
    - TypeLang
    ghc-options:
    - -O2
    - -Wnoncanonical-monad-instances
    - -Wincomplete-record-updates
    - -Wincomplete-uni-patterns
    dependencies:
    - criterion
    - generic-data
    - hypertypes
    - hypertypes-ast
